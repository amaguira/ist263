<!DOCTYPE html>
<html>
<head>
	<title>Viewport Test</title>
	<style type="text/css">
		body {
			font-size: 20px;
		}
		@media screen and (max-width: 600px) {
			body {
				font-size: 16px;
			}
			.large {
				display: none;
			}
			.small {
				display: block;
			}
		}
		@media screen and (min-width: 601px) {
			.large {
				display: block;
			}
			.small {
				display: none;
			}
		}
	</style>
</head>
<body>
	<p class="large">I'm large.</p>
	<p class="small">I'm small.</p>
</body>
</html>
