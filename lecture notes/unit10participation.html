<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Viewport Test</title>
    <body>
        <h1 class="large">I'm large.</h1>
        <h2 class="small">I'm small.</h2>
     </body>
    <style>
      .large {
        display: block;
      }
      
      .small {
        display: none;
      }
      
      @media (max-width: 600px) {
        .large {
          display: none;
        }
        
        .small {
          display: block;
        }
      }
      
      @media (min-width: 601px) {
        .large {
          display: block;
        }
        
        .small {
          display: none;
        }
      }
    </style>
  </head>
  
</html>
